# -----------------------------------------------------------------------------
# Site Settings — Gaurav Kumar Gautam
# -----------------------------------------------------------------------------

locale                   : "en-US"
title                    : "Gaurav Kumar Gautam"
title_separator          : "|"
name                     : &name "Gaurav Kumar Gautam"
description              : &description "Geospatial AI Researcher · Prospective PhD Student, Fall 2027. Remote sensing, InSAR deformation monitoring, and generative models for geohazard assessment and mining-environment monitoring."
url                      : "https://gautam-ism.github.io"
baseurl                  : ""
repository               : "Gautam-ism/Gautam-ism.github.io"
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

# SEO
google_site_verification :
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :

# Social sharing
twitter:
  username               :
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 : "/images/profile.png"

# Social profiles
social:
  type                   : Person
  name                   : *name
  links:
    - "https://scholar.google.com/citations?user=4chg1EwAAAAJ&hl=en"
    - "https://orcid.org/0009-0000-3032-1479"
    - "https://github.com/Gautam-ism"
    - "https://www.linkedin.com/in/gaukrgau"

analytics:
  provider               : false

# -----------------------------------------------------------------------------
# Site Author — Only include keys that should render in sidebar
# (Empty keys are truthy in Liquid — omit them entirely instead)
# -----------------------------------------------------------------------------
author:
  avatar           : "profile.png"
  name             : "Gaurav Kumar Gautam"
  bio              : "Geospatial AI Researcher · Prospective PhD Student, Fall 2027"
  location         : "Dhanbad, India"
  employer         : "IIT (ISM) Dhanbad"
  email            : "gauravapgautam@gmail.com"
  googlescholar    : "https://scholar.google.com/citations?user=4chg1EwAAAAJ&hl=en"
  orcid            : "https://orcid.org/0009-0000-3032-1479"
  github           : "Gautam-ism"
  linkedin         : "gaukrgau"

# -----------------------------------------------------------------------------
# Reading Files
# -----------------------------------------------------------------------------
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# -----------------------------------------------------------------------------
# Conversion
# -----------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: Asia/Kolkata

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development

collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: false
      share: false
      comment: false
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: false

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Gautam-ism"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/gaukrgau"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=4chg1EwAAAAJ&hl=en"
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/0009-0000-3032-1479"

copyright                : "Gaurav Kumar Gautam"
copyright_url            : "https://gautam-ism.github.io"
